<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bettercal — Snell study rooms, simplified</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>bettercal</h1>
      <p class="tagline">Snell Library study rooms — free slots only</p>
    </div>
    <div class="filters">
      <label>
        <span>Date</span>
        <input type="date" id="filter-date" />
      </label>
      <label>
        <span>From</span>
        <input type="time" id="filter-from" step="900" />
      </label>
      <label>
        <span>To</span>
        <input type="time" id="filter-to" step="900" />
      </label>
      <div class="presets" role="group" aria-label="Quick duration presets">
        <span>Need it for</span>
        <div class="preset-buttons">
          <button type="button" class="preset" data-minutes="30">30m</button>
          <button type="button" class="preset" data-minutes="60">1h</button>
          <button type="button" class="preset" data-minutes="120">2h</button>
          <button type="button" class="preset" data-minutes="180">3h</button>
        </div>
      </div>
      <button type="button" id="filter-clear-time" class="clear-time" hidden>Clear time</button>
      <label>
        <span>Seat style</span>
        <select id="filter-style">
          <option value="">All styles</option>
          <option value="Group Study Rooms">Group Study Rooms</option>
          <option value="Graduate Group Study Rooms">Graduate Group Study Rooms</option>
          <option value="Individual Study">Individual Study</option>
          <option value="Individual Silent Study">Individual Silent Study</option>
        </select>
      </label>
      <label>
        <span>Capacity</span>
        <select id="filter-capacity">
          <option value="">Any size</option>
          <option value="1-4">1–4 people</option>
          <option value="5-8">5–8 people</option>
        </select>
      </label>
    </div>
  </header>

  <main>
    <section id="free-now-section" hidden>
      <div class="section-head">
        <h2>Free right now</h2>
        <span class="count" id="free-now-count"></span>
      </div>
      <div class="now-grid" id="free-now-grid"></div>
    </section>

    <section id="all-section">
      <div class="section-head">
        <h2 id="all-heading">All availability</h2>
        <span class="meta" id="updated-at"></span>
      </div>
      <div id="status" class="status">Loading availability…</div>
      <div id="room-list" class="room-list"></div>
    </section>
  </main>

  <footer>
    <p>Unofficial view of <a href="https://northeastern.libcal.com/reserve/spaces/studyspace" target="_blank" rel="noopener">Northeastern LibCal</a>. Booking happens on LibCal. Refreshes every minute.</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
